name: PR Checks
permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches:
      - master

jobs:
  test_and_analyze:
    name: Analyze and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate build files
        run: dart run build_runner build

      - name: Analyze code
        run: flutter analyze

      - name: Run unit tests
        run: flutter test