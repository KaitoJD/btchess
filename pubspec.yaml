name: btchess
description: "A mobile chess app for Android and iOS with local multiplayer via Bluetooth Low Energy."
publish_to: 'none'

version: 1.0.0-alpha

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Chess Engine
  dartchess: ^0.7.1

  # Bluetooth Low Energy
  flutter_blue_plus: ^1.35.3

  # BLE Peripheral (GATT server for host mode)
  ble_peripheral: ^2.4.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Settings Storage
  shared_preferences: ^2.3.5

  # Utilities
  uuid: ^4.5.1
  equatable: ^2.0.7
  collection: ^1.19.1

  # Audio (for move sounds, etc.)
  audioplayers: ^6.1.0

  # Permissions
  permission_handler: ^12.0.1

  # SVG rendering
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

  # Testing
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter

  # App Icon Generation
  flutter_launcher_icons: ^0.14.3

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1A1A2E"
  min_sdk_android: 21
  remove_alpha_ios: true

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Audio assets for game sounds
  assets:
    - assets/audio/
    - assets/piece/alpha/
    - assets/piece/chess24/
    - assets/piece/neo/
    - assets/piece/standard/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
